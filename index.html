<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhirpem App</title>
    <style>
        body {
            background-color: #0f0f12;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; font-size: 28px; }
        p { color: #aaa; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: #7c4dff;
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background: #651fff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Zhirpem App</h1>
        <p>Официальная страница приложения. Скачайте свежий релиз прямо с GitHub.</p>
        <a class="btn" href="https://github.com/rikaplay/zhirpem-app/releases/latest">Скачать APK</a>
    </div>
</body>
</html>
